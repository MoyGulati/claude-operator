<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>claude-operator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header><h1>claude-operator</h1></header>
  <nav>

    <button onclick="showTab('workers')">Workers</button>

    <section id="tab-tasks"></section>
    <section id="tab-workers" hidden></section>

  </main>
  <script src="app.js"></script>

</html>
